<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Institucional — Seciteci MT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/slides.css">
</head>
<body>

  <div class="viewport-shell">
    <div class="stage-canvas" id="stage-canvas">
      <div class="page-shell" id="page-shell">

        <div class="ambient ambient-a"></div>
        <div class="ambient ambient-b"></div>

        <div class="page-frame" id="page-frame">

          <header class="topbar">
            <img id="logo" src="assets/logo.png" alt="Governo de Mato Grosso" class="logo-img">
            <div class="topbar-actions">
              <button class="control-btn" id="toggle-btn" aria-label="Pausar">
                <svg id="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                </svg>
                <span id="btn-label">Pausar</span>
              </button>
            </div>
          </header>

          <div class="progress-shell">
            <div class="progress-bar" id="progress-bar"></div>
          </div>

          <main class="main-stage" id="main-stage"></main>

          <footer class="footer-dots">
            <div class="dot-group" id="dot-group"></div>
            <div class="footer-meta">
              <span id="slide-counter"></span>
              <span id="slide-duration"></span>
            </div>
          </footer>

        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
